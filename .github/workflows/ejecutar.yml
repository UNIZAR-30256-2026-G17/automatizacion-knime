name: Ejecutar KNIME Grupo 17
on:
  schedule:
    - cron: '0 10 * * *'  # Todos los días a las 12:00 hora España
  workflow_dispatch:

jobs:
  procesar_delitos:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 1. Descargar el repositorio
        uses: actions/checkout@v4

      - name: 2. Descargar datos brutos de la Policía
        run: |
          mkdir -p "./Montgomery/DATOS"
          curl -L -o "./Montgomery/DATOS/datos_policia_brutos.csv" \
            "https://data.montgomerycountymd.gov/resource/icn6-v9z3.csv?\$limit=1000000"

      - name: 3. Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libxtst6 libxrender1 libxi6 \
            libfontconfig1 libxcursor1 libxcomposite1 libasound2t64 xvfb

      - name: 4. Descargar KNIME 5.11
        run: |
          wget -q https://download.knime.org/analytics-platform/linux/knime_5.11.0.linux.gtk.x86_64.tar.gz
          tar -xzf knime_5.11.0.linux.gtk.x86_64.tar.gz
          mv knime_5.11.0 knime_engine

      - name: 5. Instalar NodePit Batch (compatible con 5.11, gratuito)
        run: |
          xvfb-run ./knime_engine/knime -nosplash -consoleLog \
            -application org.eclipse.equinox.p2.director \
            -repository https://download.nodepit.com/5.11 \
            -installIUs com.nodepit.batch.feature.feature.group

      - name: 6. Ejecutar Flujo de KNIME
        env:
          MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
        run: |
          xvfb-run ./knime_engine/knime -nosplash \
            -application com.nodepit.batch.application.NodePitBatchExecutor \
            -v MONGO_PASSWORD;"$MONGO_PASSWORD";String \
            -r \
            "$GITHUB_WORKSPACE/Montgomery"

      - name: 7. Guardar la memoria histórica en GitHub
        run: |
          git config --global user.name "Bot KNIME"
          git config --global user.email "bot@github.com"
          git add "./Montgomery/DATOS/crimenes_limpios.csv"
          git add "./Montgomery/DATOS/crimenes_ya_subidos.csv"
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "Actualizando histórico de crímenes" && git push)
