name: Ejecutar KNIME Grupo 17

on:
  schedule:
    - cron: '0 10 * * *'  # Todos los días a las 10:00 UTC
  workflow_dispatch:      # Botón manual por si se quiere forzar la ejecución

jobs:
  procesar_delitos:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    
    steps:
      - name: 1. Descargar el repositorio
        uses: actions/checkout@v4

      - name: 2. Descargar datos brutos de la Policía
        run: |
          curl -L -o "./Montgomery/DATOS/datos_policia_brutos.csv" "https://data.montgomerycountymd.gov/resource/icn6-v9z3.csv?\$limit=1000000"

      - name: 3. Descargar motor de KNIME
        run: |
          wget -q https://download.knime.org/analytics-platform/linux/knime_5.3.0.linux.gtk.x86_64.tar.gz
          tar -xzf knime_5.3.0.linux.gtk.x86_64.tar.gz
          mv knime_5.3.0 knime_engine

      - name: 4. Ejecutar flujo de KNIME
        run: |
          ./knime_engine/knime -nosplash -application org.knime.product.KNIME_BATCH_APPLICATION \
          -workflowDir="./Montgomery" \
          -reset
        env:
          MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}

      - name: 5. Guardar la memoria histórica en GitHub
        run: |
          git config --global user.name "Bot KNIME"
          git config --global user.email "bot@github.com"
          git add "./Montgomery/DATOS/crimenes_limpios.csv"
          git add "./Montgomery/DATOS/crimenes_ya_subidos.csv"
          git diff --quiet && git diff --staged --quiet || (git commit -m "Actualizando histórico de crímenes" && git push)
