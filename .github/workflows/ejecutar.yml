name: Ejecutar KNIME y Subir a MongoDB

on:
  workflow_dispatch: # Permite darle al botón manualmente

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Descargar el código del Repositorio
        uses: actions/checkout@v3

      - name: 2. Instalar dependencias del sistema (Monitor Virtual)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libglue-dev libxtst6 ibxrender1 libasound2 xvfb

      - name: 3. Descargar KNIME Engine (Versión 5.11 para Linux)
        run: |
          wget -q https://download.knime.org/analytics-platform/linux/knime_5.1.1.linux.gtk.x86_64.tar.gz
          tar -xzf knime_5.1.1.linux.gtk.x86_64.tar.gz
          mv knime_5.1.1 knime_engine

      - name: 4. Ejecutar Flujo de KNIME (Modo Headless)
        env:
          MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
        run: |
          xvfb-run ./knime_engine/knime -nosplash -application org.knime.product.KNIME_BATCH_APPLICATION \
          -workflowDir="./Montgomery" \
          -reset \
          -workflow.variable=MONGO_PASSWORD,"$MONGO_PASSWORD",String
